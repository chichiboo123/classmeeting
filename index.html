<!doctype html>
<html><head><meta charset="utf-8"><style>body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans KR', Arial, sans-serif;
  padding: 20px;
  background: #eaf3ff;
  text-align: center;
}
h1{ color:#1e40af }
button{
  background:#2563eb; color:white; border:0; padding:10px 18px; border-radius:10px;
}
button:hover{ filter:brightness(.95) }</style></head>
<body>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나세나반 학급 회의</title>
    
    <!-- 기본 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />
    <!-- 디자인 폰트: Black Han Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                        display: ['"Black Han Sans"', 'sans-serif'],
                    },
                    colors: {
                        kidprimary: '#FF9EAA',
                        kidsecondary: '#3AC0FF',
                        kidbg: '#FFFBF0',
                        kidbox: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <style>
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #FF9EAA; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff7a8a; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-kidbg text-gray-800 font-sans min-h-screen flex flex-col selection:bg-kidsecondary selection:text-white">

    <!-- 상단 헤더 -->
    <header class="bg-kidprimary text-white p-4 shadow-md text-center">
        <h1 class="font-display text-3xl md:text-4xl tracking-wide">✨ 나세나반 학급 회의 ✨</h1>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow flex flex-col items-center p-4 md:p-6 w-full max-w-3xl mx-auto">
        
        <!-- 진행 바 -->
        <div class="w-full flex justify-between items-center mb-6 px-2">
            <div class="flex space-x-2 w-full justify-center" id="progress-dots">
                <!-- JS에서 동적 생성 -->
            </div>
        </div>

        <!-- 카드 컨테이너 -->
        <div class="bg-kidbox w-full rounded-3xl shadow-xl p-6 md:p-8 border-4 border-yellow-100 flex-grow flex flex-col">
            
            <!-- 단계별 컨텐츠가 표시될 곳 -->
            <div id="step-content" class="flex-grow fade-in">
                <!-- JS에서 내용 주입 -->
            </div>

            <!-- 네비게이션 버튼 -->
            <div class="flex justify-between mt-8 pt-4 border-t-2 border-gray-100">
                <button id="btn-prev" onclick="prevStep()" class="hidden px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-2xl text-lg transition-colors">
                    ◀ 이전으로
                </button>
                <div class="flex-grow"></div>
                <button id="btn-next" onclick="nextStep()" class="px-8 py-3 bg-kidsecondary hover:bg-blue-400 text-white font-bold rounded-2xl text-lg shadow-md transition-transform transform hover:scale-105">
                    다음으로 ▶
                </button>
                <button id="btn-finish" onclick="finishMeeting()" class="hidden px-8 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-2xl text-lg shadow-md transition-transform transform hover:scale-105">
                    회의 마치기 🏁
                </button>
            </div>
        </div>
    </main>

    <!-- 하단 푸터 -->
    <footer class="bg-gray-800 text-gray-300 text-center py-4 text-sm mt-auto">
        <a href="https://litt.ly/chichiboo" target="_blank" class="hover:text-kidsecondary transition-colors font-bold text-base">
            Created by. 교육뮤지컬 꿈꾸는 치수쌤
        </a>
    </footer>

    <!-- 알림 모달 -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        복사되었습니다!
    </div>

    <!-- 스크립트 로직 -->
    <script>
        // 데이터 저장 객체
        const meetingData = {
            month: new Date().getMonth() + 1,
            date: new Date().toLocaleDateString('ko-KR'),
            reflection: { good: '', bad: '', wish: '' },
            goal: '',
            proposal: '',
            teacherMsg: ''
        };

        const steps = [
            {
                title: "1. 개회선언 및 약속 선서 🎤",
                script: `
                    <p class="mb-2"><strong>안녕하세요. 이제 나세나반 학급회의를 시작하려고 합니다.</strong></p>
                    <p class="mb-2">친구들은 바르게 앉아 주시기 바랍니다.</p>
                    <p class="mb-4 text-kidsecondary font-bold">지금부터 <span class="month-display"></span>월 나세나반 학급회의를 시작합니다.</p>
                    <p class="mb-2">먼저 나세나반 약속을 함께 읽겠습니다.<br>한 문장씩 제가 읽으면, 여러분은 따라 읽어 주십시오.</p>
                    <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200 mt-4 text-gray-700 font-medium text-lg">
                        <p class="mb-1">🖐️ 첫째, 나의 마음과 생각을 깊이 들여다보겠습니다.</p>
                        <p class="mb-1">🖐️ 둘째, 세상을 따뜻한 눈으로 바라보겠습니다.</p>
                        <p class="mb-1">🖐️ 셋째, 내가 나눌 수 있는 것을 생각하고 나눔을 실천하겠습니다.</p>
                    </div>
                `,
                inputHtml: `
                    <div class="mt-6">
                        <label class="block text-xl font-bold mb-3 text-gray-700">이번 달은 몇 월인가요?</label>
                        <div class="flex items-center space-x-3">
                            <input type="number" id="input-month" min="1" max="12" value="${meetingData.month}" class="w-24 p-3 border-2 border-kidsecondary rounded-xl text-center text-xl font-bold focus:outline-none focus:ring-4 focus:ring-blue-100" onchange="updateMonth(this.value)">
                            <span class="text-xl font-bold">월</span>
                        </div>
                    </div>
                `
            },
            {
                title: "2. 거울(돌아보기) 회의 🪞",
                script: `
                    <p class="mb-2">다음은 거울(돌아보기) 회의 시간입니다.<br>거울 회의는 좋았던 점, 아쉬웠던 점, 바라는 점을 이야기하는 시간입니다.</p>
                    <p class="mb-2">먼저 자치팀별로 모여 이야기를 나누겠습니다.<br>좋았던 점, 아쉬웠던 점, 바라는 점을 차례대로 이야기해 주세요.<br>친구의 말을 끊지 않고 끝까지 잘 들어주면 좋겠습니다. <span class="text-gray-500 text-sm">(잠시 회의 시간)</span></p>
                    <p class="mb-2 mt-4 text-blue-600 font-bold">이제 자치팀별 발표를 시작하겠습니다.<br>00팀 발표자 학생부터 차례대로 일어나 발표해 주세요.</p>
                    <p class="mb-2 mt-4">발표한 학생들에게 박수를 쳐줍시다. 👏<br>친구들의 의견을 잘 들으며 우리 반을 더 좋은 반으로 만들어 가면 좋겠습니다.</p>
                `,
                inputHtml: `
                    <div class="mt-6 space-y-4">
                        <div>
                            <label class="block text-lg font-bold mb-2 text-green-600">🥰 좋았던 점</label>
                            <textarea id="input-ref-good" rows="2" placeholder="우리 반의 좋았던 점을 적어주세요." class="w-full p-3 border-2 border-green-200 rounded-xl focus:outline-none focus:border-green-400" onchange="meetingData.reflection.good = this.value">${meetingData.reflection.good}</textarea>
                        </div>
                        <div>
                            <label class="block text-lg font-bold mb-2 text-orange-500">🥲 아쉬웠던 점</label>
                            <textarea id="input-ref-bad" rows="2" placeholder="조금 아쉬웠거나 고쳐야 할 점을 적어주세요." class="w-full p-3 border-2 border-orange-200 rounded-xl focus:outline-none focus:border-orange-400" onchange="meetingData.reflection.bad = this.value">${meetingData.reflection.bad}</textarea>
                        </div>
                        <div>
                            <label class="block text-lg font-bold mb-2 text-blue-500">🙏 바라는 점</label>
                            <textarea id="input-ref-wish" rows="2" placeholder="앞으로 이렇게 되면 좋겠다는 점을 적어주세요." class="w-full p-3 border-2 border-blue-200 rounded-xl focus:outline-none focus:border-blue-400" onchange="meetingData.reflection.wish = this.value">${meetingData.reflection.wish}</textarea>
                        </div>
                    </div>
                `
            },
            {
                title: "3. 다음 달 목표 정하기 🎯",
                script: `
                    <p class="mb-2">다음은 다음 달 목표를 정하는 시간입니다.<br>우리 반이 다음 달에 함께 실천하면 좋을 목표를 생각해 봅시다. <span class="text-gray-500 text-sm">(잠시 생각할 시간)</span></p>
                    <p class="mb-2 mt-4 text-blue-600 font-bold">의견이 있는 친구는 손을 들고 발표해 주세요.</p>
                    <p class="mb-2 mt-4">여러 친구들의 의견을 들었습니다.<br>이제 나온 의견을 바탕으로 우리 반의 다음 달 목표를 정하겠습니다. <span class="text-gray-500 text-sm">(투표 진행)</span></p>
                    <p class="mb-2 mt-4 text-green-600 font-bold">정해진 목표를 다시 한번 함께 말해 보겠습니다.</p>
                    <p>우리 모두 다음 달 목표를 기억하고 함께 실천해 보면 좋겠습니다.</p>
                `,
                inputHtml: `
                    <div class="mt-6">
                        <label class="block text-xl font-bold mb-3 text-gray-700">🌟 우리 반 다음 달 목표</label>
                        <textarea id="input-goal" rows="3" placeholder="투표로 정해진 다음 달 목표를 적어주세요!" class="w-full p-4 border-2 border-kidsecondary rounded-xl text-lg focus:outline-none focus:ring-4 focus:ring-blue-100" onchange="meetingData.goal = this.value">${meetingData.goal}</textarea>
                    </div>
                `
            },
            {
                title: "4. 제안하기 💡",
                script: `
                    <p class="mb-2">다음은 제안하기 시간입니다.<br>우리 반을 더 나은 반으로 만들기 위한 생각이 있으면 발표해 주세요. <span class="text-gray-500 text-sm">(잠시 생각할 시간)</span></p>
                    <p class="mb-2 text-blue-600 font-bold">제안할 때에는 제안하는 이유도 함께 말해 주면 더 좋습니다.<br>여러분은 발표자의 말을 잘 들어 주세요.</p>
                    <p class="mb-2 mt-4">좋은 의견을 내 준 학생들에게 박수 부탁드립니다. 👏<br>오늘 나온 제안은 함께 생각해 보고 실천할 수 있도록 하겠습니다.</p>
                `,
                inputHtml: `
                    <div class="mt-6">
                        <label class="block text-xl font-bold mb-3 text-gray-700">📝 제안 내용 및 이유</label>
                        <textarea id="input-proposal" rows="4" placeholder="친구들이 제안한 내용과 그 이유를 자세히 적어주세요." class="w-full p-4 border-2 border-purple-200 rounded-xl text-lg focus:outline-none focus:ring-4 focus:ring-purple-100" onchange="meetingData.proposal = this.value">${meetingData.proposal}</textarea>
                    </div>
                `
            },
            {
                title: "5. 선생님 말씀 👨‍🏫",
                script: `
                    <p class="mb-2 text-lg">다음은 담임 선생님 말씀을 듣겠습니다.</p>
                    <p class="text-xl font-bold text-kidprimary">"선생님, 말씀 부탁드립니다!"</p>
                `,
                inputHtml: `
                    <div class="mt-6">
                        <label class="block text-xl font-bold mb-3 text-gray-700">💬 선생님 말씀 요약</label>
                        <textarea id="input-teacher" rows="4" placeholder="선생님이 해주신 좋은 말씀을 요약해서 적어주세요." class="w-full p-4 border-2 border-yellow-300 rounded-xl text-lg focus:outline-none focus:ring-4 focus:ring-yellow-100" onchange="meetingData.teacherMsg = this.value">${meetingData.teacherMsg}</textarea>
                    </div>
                `
            },
            {
                title: "6. 폐회 선언 🏁",
                script: `
                    <p class="mb-2">이제 모든 순서를 마쳤습니다.<br>끝까지 바르게 참여해 준 친구들 감사합니다.</p>
                    <p class="text-xl font-bold text-kidsecondary mt-4">이상으로 <span class="month-display"></span>월 나세나반 학급회의를 마치겠습니다.</p>
                    <p class="text-lg font-bold mt-2">감사합니다! 🙇‍♂️🙇‍♀️</p>
                `,
                inputHtml: `
                    <div class="mt-8 bg-gray-50 p-6 rounded-2xl border border-gray-200">
                        <h3 class="font-display text-2xl text-center mb-4 text-gray-800">📋 회의 결과 내보내기</h3>
                        <p class="text-center text-gray-600 mb-6">수고하셨습니다! 기록한 내용을 저장하거나 복사하세요.</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <button onclick="copyResult()" class="flex flex-col items-center justify-center p-4 bg-white border-2 border-gray-300 rounded-xl hover:bg-gray-100 hover:border-gray-400 transition-colors">
                                <span class="text-3xl mb-2">📋</span>
                                <span class="font-bold">클립보드 복사</span>
                            </button>
                            <button onclick="downloadTxt()" class="flex flex-col items-center justify-center p-4 bg-white border-2 border-blue-300 rounded-xl hover:bg-blue-50 hover:border-blue-400 transition-colors">
                                <span class="text-3xl mb-2">📄</span>
                                <span class="font-bold">TXT 다운로드</span>
                            </button>
                            <button onclick="downloadJson()" class="flex flex-col items-center justify-center p-4 bg-white border-2 border-green-300 rounded-xl hover:bg-green-50 hover:border-green-400 transition-colors">
                                <span class="text-3xl mb-2">💻</span>
                                <span class="font-bold">JSON 다운로드</span>
                            </button>
                        </div>
                    </div>
                `
            }
        ];

        let currentStepIndex = 0;

        function updateMonth(val) {
            meetingData.month = val;
            renderDisplayMonth();
        }

        function renderDisplayMonth() {
            const displays = document.querySelectorAll('.month-display');
            displays.forEach(el => el.textContent = meetingData.month);
        }

        function renderDots() {
            const dotsContainer = document.getElementById('progress-dots');
            let dotsHtml = '';
            for (let i = 0; i < steps.length; i++) {
                if (i === currentStepIndex) {
                    dotsHtml += `<div class="w-8 h-3 rounded-full bg-kidprimary transition-all duration-300"></div>`;
                } else if (i < currentStepIndex) {
                    dotsHtml += `<div class="w-3 h-3 rounded-full bg-kidprimary opacity-50 transition-all duration-300"></div>`;
                } else {
                    dotsHtml += `<div class="w-3 h-3 rounded-full bg-gray-200 transition-all duration-300"></div>`;
                }
            }
            dotsContainer.innerHTML = dotsHtml;
        }

        function renderStep() {
            const step = steps[currentStepIndex];
            const contentDiv = document.getElementById('step-content');
            
            // 컨텐츠 생성
            contentDiv.innerHTML = `
                <h2 class="font-display text-2xl md:text-3xl text-gray-800 mb-6">${step.title}</h2>
                <div class="bg-blue-50/50 border-l-4 border-kidsecondary p-5 rounded-r-2xl mb-6 text-lg md:text-xl leading-relaxed text-gray-700 shadow-sm">
                    ${step.script}
                </div>
                <div>
                    ${step.inputHtml}
                </div>
            `;

            // 애니메이션 재적용을 위한 트릭
            contentDiv.classList.remove('fade-in');
            void contentDiv.offsetWidth; 
            contentDiv.classList.add('fade-in');

            // 버튼 표시 제어
            document.getElementById('btn-prev').style.display = currentStepIndex > 0 ? 'block' : 'none';
            
            if (currentStepIndex === steps.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-finish').style.display = 'block';
            } else {
                document.getElementById('btn-next').style.display = 'block';
                document.getElementById('btn-finish').style.display = 'none';
            }

            renderDots();
            renderDisplayMonth();

            // 상단으로 부드럽게 스크롤
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextStep() {
            // 현재 단계의 input 값들을 data 객체에 업데이트 (onchange 외의 안전장치)
            saveCurrentInputs();
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                renderStep();
            }
        }

        function prevStep() {
            saveCurrentInputs();
            if (currentStepIndex > 0) {
                currentStepIndex--;
                renderStep();
            }
        }

        function saveCurrentInputs() {
            if(document.getElementById('input-month')) meetingData.month = document.getElementById('input-month').value;
            if(document.getElementById('input-ref-good')) meetingData.reflection.good = document.getElementById('input-ref-good').value;
            if(document.getElementById('input-ref-bad')) meetingData.reflection.bad = document.getElementById('input-ref-bad').value;
            if(document.getElementById('input-ref-wish')) meetingData.reflection.wish = document.getElementById('input-ref-wish').value;
            if(document.getElementById('input-goal')) meetingData.goal = document.getElementById('input-goal').value;
            if(document.getElementById('input-proposal')) meetingData.proposal = document.getElementById('input-proposal').value;
            if(document.getElementById('input-teacher')) meetingData.teacherMsg = document.getElementById('input-teacher').value;
        }

        function finishMeeting() {
            alert("수고하셨습니다! 학급 회의가 성공적으로 기록되었습니다. 결과를 내보내서 공유해보세요!");
        }

        // --- 내보내기 기능 ---
        function generateReportText() {
            return `[나세나반 ${meetingData.month}월 학급회의 결과]
일시: ${meetingData.date}

1. 거울(돌아보기) 회의
- 좋았던 점: ${meetingData.reflection.good || '없음'}
- 아쉬웠던 점: ${meetingData.reflection.bad || '없음'}
- 바라는 점: ${meetingData.reflection.wish || '없음'}

2. 다음 달 목표
- ${meetingData.goal || '없음'}

3. 제안 내용
- ${meetingData.proposal || '없음'}

4. 선생님 말씀
- ${meetingData.teacherMsg || '없음'}
`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2000);
        }

        function copyResult() {
            const text = generateReportText();
            // iframe 환경 등에서 clipboard API가 안될 수 있으므로 execCommand 폴백 사용
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("회의록이 클립보드에 복사되었습니다!");
            } catch (err) {
                alert('복사에 실패했습니다.');
            }
            document.body.removeChild(textArea);
        }

        function downloadTxt() {
            const text = generateReportText();
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `나세나반_${meetingData.month}월_학급회의록.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("TXT 파일이 다운로드 되었습니다!");
        }

        function downloadJson() {
            const jsonStr = JSON.stringify(meetingData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `나세나반_${meetingData.month}월_데이터.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("JSON 파일이 다운로드 되었습니다!");
        }

        // 초기 화면 렌더링
        window.onload = () => {
            renderStep();
        };

    </script>
